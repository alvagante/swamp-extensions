id: 12c74cfd-aa80-4d9b-a16c-dcca6928f689
name: content-mini-site
description: Generate a mini-site with an AI hero image, a first-person narrated Ixen page, and a background music track
version: 2
inputs:
  properties:
    outputDir:
      type: string
      description: Directory where all files (hero.png, audio, index.html) will be written
    topic:
      type: string
      description: Topic for the Ixen page and music
    heroPrompt:
      type: string
      description: Image generation prompt for the hero image
    style:
      type: string
      default: ixen-light
      description: Image style preset (ixen-dark, ixen-light, pencil-bw, pencil-color-accents, blueprint, technical-diagram, cyberpunk-photo, educational, none)
    background:
      type: string
      default: opaque
      description: Image background (opaque, transparent, auto)
    skillLevel:
      type: string
      default: intermediate
      description: Reader skill level (novice, intermediate, senior, guru)
    outputLength:
      type: string
      default: medium
      description: Page length (short, medium, long)
    musicGenre:
      type: string
      default: ambient
      description: Music genre for the background track
    musicMood:
      type: string
      default: contemplative
      description: Music mood for the background track
  required:
    - outputDir
    - topic
    - heroPrompt
jobs:
  - name: images
    description: Generate the hero image
    steps:
      - name: hero
        description: Generate hero image and write to outputDir as hero.png
        task:
          type: model_method
          modelIdOrName: my-image
          methodName: generate
          inputs:
            prompt: ${{ inputs.heroPrompt }}
            style: ${{ inputs.style }}
            background: ${{ inputs.background }}
            filename: hero.png
            outputDir: ${{ inputs.outputDir }}
  - name: music
    description: Generate background music track
    steps:
      - name: track
        description: Generate song lyrics and audio, write to outputDir
        task:
          type: model_method
          modelIdOrName: my-music
          methodName: generate
          inputs:
            topic: ${{ inputs.topic }}
            genre: ${{ inputs.musicGenre }}
            mood: ${{ inputs.musicMood }}
            outputDir: ${{ inputs.outputDir }}
  - name: page
    description: Generate Ixen narrated page with hero image and music player
    dependsOn:
      - job: images
        condition:
          type: succeeded
      - job: music
        condition:
          type: succeeded
    steps:
      - name: generate
        description: Generate Ixen page and write to outputDir as index.html
        task:
          type: model_method
          modelIdOrName: my-ixen
          methodName: generate
          inputs:
            topic: ${{ inputs.topic }}
            media: hero.png
            skillLevel: ${{ inputs.skillLevel }}
            outputLength: ${{ inputs.outputLength }}
            outputDir: ${{ inputs.outputDir }}
            musicFilename: ${{ data.latest("my-music", "song").attributes.filename }}
            musicTitle: ${{ data.latest("my-music", "song").attributes.title }}
            musicLyrics: ${{ data.latest("my-music", "song").attributes.lyrics }}
