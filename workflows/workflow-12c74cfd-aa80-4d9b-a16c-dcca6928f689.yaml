id: 12c74cfd-aa80-4d9b-a16c-dcca6928f689
name: content-mini-site
description: "Generate a mini-site with concept-driven AI images, a cheatsheet popup, a first-person narrated Ixen page, versioned previous output, and a background music track. Requires models: my-image, my-cheatsheet, my-music, my-ixen."
version: 4
inputs:
  type: object
  properties:
    outputDir:
      type: string
      description: Directory where all current files and numeric previous-version subdirectories will be written
    topic:
      type: string
      description: Topic for the Ixen page, cheatsheet, and music
    concepts:
      type: array
      minItems: 1
      description: Ordered concepts for the Ixen page; each concept gets an image, slide popup, explanatory popup, and Ixen glue text
      items:
        type: object
        properties:
          name:
            type: string
            description: Concept label used by content-ixen
          details:
            type: string
            description: Technical facts or boundaries for this concept
          imagePrompt:
            type: string
            description: Prompt for the concept image
          imageFilename:
            type: string
            description: Filename to write under outputDir and reference from content-ixen
        required:
          - name
          - imagePrompt
          - imageFilename
    style:
      type: string
      default: ixen-light
      description: Image style preset for both images (ixen-dark, ixen-light, pencil-bw, pencil-color-accents, blueprint, technical-diagram, cyberpunk-photo, educational, none)
    background:
      type: string
      default: opaque
      description: Image background (opaque, transparent, auto)
    skillLevel:
      type: string
      default: intermediate
      description: Reader skill level (novice, intermediate, senior, guru)
    outputLength:
      type: string
      default: medium
      description: Page length (short, medium, long)
    musicGenre:
      type: string
      default: ambient
      description: Music genre for the background track
    musicMood:
      type: string
      default: contemplative
      description: Music mood for the background track
  required:
    - outputDir
    - topic
    - concepts
jobs:
  - name: prepare
    description: Move an existing generated Ixen output to the next numeric version directory before new media overwrites root files
    steps:
      - name: rotate
        description: Rotate existing root Ixen artifacts into outputDir/1, outputDir/2, ...
        task:
          type: model_method
          modelType: "@alvagante/content-ixen"
          modelName: my-ixen
          methodName: prepare
          inputs:
            outputDir: ${{ inputs.outputDir }}
            enabled: true
  - name: images
    description: Generate one image per configured concept
    dependsOn:
      - job: prepare
        condition:
          type: succeeded
    steps:
      - name: image-${{ self.concept.imageFilename }}
        description: Generate concept image and write it to outputDir using the configured filename
        forEach:
          item: concept
          in: ${{ inputs.concepts }}
        task:
          type: model_method
          modelIdOrName: my-image
          methodName: generate
          inputs:
            prompt: ${{ self.concept.imagePrompt }}
            style: ${{ inputs.style }}
            background: ${{ inputs.background }}
            filename: ${{ self.concept.imageFilename }}
            outputDir: ${{ inputs.outputDir }}
  - name: cheatsheet
    description: Generate cheatsheet HTML (my-cheatsheet must be an @alvagante/content-cheatsheet model instance)
    dependsOn:
      - job: prepare
        condition:
          type: succeeded
    steps:
      - name: generate
        description: Generate cheatsheet and write to outputDir as cheatsheet.html
        task:
          type: model_method
          modelIdOrName: my-cheatsheet
          methodName: generate
          inputs:
            topic: ${{ inputs.topic }}
            skillLevel: ${{ inputs.skillLevel }}
            outputFormat: html
            filename: cheatsheet.html
            outputDir: ${{ inputs.outputDir }}
  - name: music
    description: Generate background music track
    dependsOn:
      - job: prepare
        condition:
          type: succeeded
    steps:
      - name: track
        description: Generate song lyrics and audio, write to outputDir
        task:
          type: model_method
          modelIdOrName: my-music
          methodName: generate
          inputs:
            topic: ${{ inputs.topic }}
            genre: ${{ inputs.musicGenre }}
            mood: ${{ inputs.musicMood }}
            outputDir: ${{ inputs.outputDir }}
  - name: page
    description: Generate Ixen narrated page with hero + concept images, cheatsheet popup, and music player
    dependsOn:
      - job: images
        condition:
          type: succeeded
      - job: cheatsheet
        condition:
          type: succeeded
      - job: music
        condition:
          type: succeeded
    steps:
      - name: generate
        description: Generate Ixen page and write to outputDir as index.html
        task:
          type: model_method
          modelType: "@alvagante/content-ixen"
          modelName: my-ixen
          methodName: generate
          inputs:
            apiKey: ${{ vault.get(anthropic-keys, api-key) }}
            topic: ${{ inputs.topic }}
            concepts: ${{ inputs.concepts }}
            skillLevel: ${{ inputs.skillLevel }}
            outputLength: ${{ inputs.outputLength }}
            outputDir: ${{ inputs.outputDir }}
            versionOutput: false
            cheatsheetPath: cheatsheet.html
            musicFilename: ${{ data.latest("my-music", "song").attributes.filename }}
            musicTitle: ${{ data.latest("my-music", "song").attributes.title }}
            musicLyrics: ${{ data.latest("my-music", "song").attributes.lyrics }}
