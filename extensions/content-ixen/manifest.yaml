manifestVersion: 1
name: "@alvagante/content-ixen"
version: "2026.06.17.4"
description: "Generate Ixen pages — self-narrated, mixed-media web pages in the tradition of 'I, Xen' (2005), where the technology itself speaks in first person while teaching real technical content. Self-contained HTML output with pop-up command windows, zoomable images, embedded video/audio/PDF. Uses Claude or any OpenAI-compatible endpoint, or saves agent-written pages keylessly."
repository: "https://github.com/alvagante/swamp-extensions"
paths:
  base: manifest
models:
  - extensions/models/content_ixen.ts
additionalFiles:
  - README.md
  - LICENSE.txt
platforms:
  - linux-x86_64
  - darwin-aarch64
labels:
  - content
  - html
  - storytelling
  - writing
  - ai
  - anthropic
