manifestVersion: 1
name: "@alvagante/content-iam"
version: "2026.07.01.1"
description: "Generate 'I Am' biography minisites — self-narrated, editorial-style HTML pages where a real person, fictional character, or AI persona speaks in first person about their own life. Facets replace concepts; a Dateline replaces the cheatsheet; an Influence Map replaces the infographic. Wikipedia grounding for real subjects. Sticky sidebar navigation, side-drawer study popups, 3D-flip facet card grid, and an optional bottom audio player. Visual register: editorial magazine (Georgia serif, warm off-white palette, warm brown accent) — intentionally distinct from @alvagante/content-ixen."
repository: "https://github.com/alvagante/swamp-extensions"
paths:
  base: manifest
models:
  - extensions/models/content_iam.ts
additionalFiles:
  - README.md
  - LICENSE.txt
platforms:
  - linux-x86_64
  - darwin-aarch64
labels:
  - content
  - html
  - biography
  - storytelling
  - writing
  - ai
  - anthropic
  - editorial
