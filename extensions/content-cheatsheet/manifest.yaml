manifestVersion: 1
name: "@alvagante/content-cheatsheet"
version: "2026.06.17.1"
description: "Generate dense, visually structured cheatsheets on any technical topic. Outputs print-to-PDF-ready HTML (Cmd-P → Save as PDF) or GitHub-flavoured Markdown. Configurable skill level (novice→guru), verbosity, and completeness. Uses Claude or any OpenAI-compatible endpoint, or stores agent-written content keylessly."
repository: "https://github.com/alvagante/swamp-extensions"
models:
  - content_cheatsheet.ts
additionalFiles:
  - README.md
  - LICENSE.txt
platforms:
  - linux-x86_64
  - darwin-aarch64
labels:
  - content
  - html
  - markdown
  - documentation
  - ai
  - anthropic
